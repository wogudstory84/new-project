<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>짜장 vs 짬뽕 AI 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-toggle-button">🌙</button>
        </div>
        <h1>짜장 vs 짬뽕 AI 테스트</h1>
        <p class="description">이미지 파일을 업로드하면 AI가 짜장면인지 짬뽕인지 분석합니다.</p>
        
        <div id="test-container">
            <div class="file-upload">
                <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)" style="display: none;">
                <label for="file-input" class="upload-label" id="upload-label">이미지 업로드하기</label>
            </div>
            
            <div id="image-preview-container">
                <img id="image-preview" src="" alt="미리보기" style="display:none;">
            </div>
            
            <div id="label-container"></div>
        </div>

        <div class="partnership-container">
            <hr>
            <h2>제휴 및 문의</h2>
            <form action="https://formspree.io/f/xykbejen" method="POST">
                <div class="form-group">
                    <label for="email">이메일:</label>
                    <input type="email" id="email" name="email" required placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용:</label>
                    <textarea id="message" name="message" required placeholder="문의 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-button">메시지 보내기</button>
            </form>
        </div>

        <div id="comments-container">
            <hr>
            <div id="disqus_thread"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname;
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://wogudstory.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
